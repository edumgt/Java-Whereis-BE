services:
  mariadb:
    image: mariadb:11.4
    container_name: whereis-mariadb
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: 123456
      MARIADB_DATABASE: homedb
      TZ: Asia/Seoul
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./db.sql:/docker-entrypoint-initdb.d/01-db.sql:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mariadb-data:
