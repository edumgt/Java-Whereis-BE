apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-service
  namespace: default
  labels:
    app: news-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: news-service
  template:
    metadata:
      labels:
        app: news-service
    spec:
      containers:
        - name: news-service
          image: whereis/news-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8085
          env:
            - name: SERVER_PORT
              value: "8085"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: news-service
  namespace: default
  labels:
    app: news-service
spec:
  selector:
    app: news-service
  type: NodePort
  ports:
    - port: 8085
      targetPort: 8085
      nodePort: 30085
      protocol: TCP
